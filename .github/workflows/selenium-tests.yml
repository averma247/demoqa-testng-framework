name: Selenium TestNG CI

on:

  push:
    branches:
      - master
      - workflow

  pull_request:
    branches:
      - master
      - develop

  workflow_dispatch:

jobs:

  selenium-tests:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome Installation
        run: chrome --version

      - name: Run Selenium TestNG Tests
        run: |
          mvn clean test \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true

      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReports
          path: Reports/

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots
          path: Screenshots/

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestNG-Reports
          path: test-output/

      - name: Archive Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/