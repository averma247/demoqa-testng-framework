name: Selenium TestNG CI

on:

  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - develop

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  selenium-tests:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome Installation
        run: chrome --version

      - name: Run Selenium TestNG Tests
        run: |
          mvn clean test \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true

      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReports
          path: Reports/

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots
          path: Screenshots/

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestNG-Reports
          path: test-output/

      - name: Archive Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      # --------------------------------
      # GitHub Pages Deployment
      # Only deploy from master branch
      # --------------------------------

      - name: Setup GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Prepare GitHub Pages Content
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          mkdir -p site
          cp -r Reports/* site/ || true
          cp -r test-output/* site/ || true

      - name: Upload GitHub Pages Artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v4



      # --------------------------------
      # Send Email Report
      # --------------------------------

      - name: Send Test Report Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: |
            Selenium TestNG Report - ${{ job.status }}

          to: yourmail@gmail.com
          from: GitHub Actions

          body: |
            Automation Execution Completed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Triggered By: ${{ github.actor }}

            Job Status: ${{ job.status }}

            GitHub Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Extent Report:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

          attachments: |
            Reports/ExtentReport.html
